  <body>
  <!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FUNK CITY — Lucky Wheel</title>
  <style>
    :root{
      --bg1:#070A1A;
      --bg2:#0B1033;
      --neon:#7C5CFF;
      --neon2:#00E5FF;
      --gold:#FFD54A;
      --panel: rgba(255,255,255,.06);
      --panel2: rgba(255,255,255,.10);
      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.70);
      --shadow: 0 24px 80px rgba(0,0,0,.55);
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Helvetica Neue", sans-serif;
      color: var(--text);
      overflow:hidden;
      background: radial-gradient(1200px 800px at 20% 10%, rgba(124,92,255,.25), transparent 55%),
                  radial-gradient(900px 700px at 80% 25%, rgba(0,229,255,.18), transparent 52%),
                  radial-gradient(800px 600px at 45% 95%, rgba(255,213,74,.12), transparent 55%),
                  linear-gradient(180deg, var(--bg1), var(--bg2));
    }

    /* Subtle animated grid + glow blobs */
    .bg-grid{
      position:fixed; inset:0;
      background-image:
        linear-gradient(to right, rgba(255,255,255,.06) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255,255,255,.05) 1px, transparent 1px);
      background-size: 56px 56px;
      mask-image: radial-gradient(circle at 50% 40%, rgba(0,0,0,1), rgba(0,0,0,.15) 62%, transparent 78%);
      opacity:.35;
      pointer-events:none;
      transform: translateZ(0);
    }
    .blob{
      position:fixed;
      width:560px; height:560px;
      filter: blur(40px);
      opacity:.35;
      border-radius: 999px;
      pointer-events:none;
      mix-blend-mode: screen;
      animation: floaty 10s ease-in-out infinite;
    }
    .blob.b1{ left:-160px; top:-180px; background: radial-gradient(circle at 30% 30%, rgba(124,92,255,.95), transparent 60%); }
    .blob.b2{ right:-220px; top:40px; background: radial-gradient(circle at 30% 30%, rgba(0,229,255,.85), transparent 62%); animation-delay: -3s;}
    .blob.b3{ left:30%; bottom:-260px; background: radial-gradient(circle at 30% 30%, rgba(255,213,74,.75), transparent 62%); animation-delay: -6s;}
    @keyframes floaty{
      0%,100%{ transform: translate(0,0) scale(1); }
      50%{ transform: translate(16px, -18px) scale(1.04); }
    }

    .wrap{
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 22px 16px;
    }

    .card{
      width:min(440px, 96vw);
      background: linear-gradient(180deg, var(--panel), rgba(255,255,255,.04));
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 22px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      padding: 18px 16px 16px;
      position:relative;
    }

    .title{
      text-align:center;
      font-weight: 900;
      letter-spacing: .18em;
      font-size: 22px;
      margin: 6px 0 14px;
      text-transform: uppercase;
      background: linear-gradient(90deg, rgba(255,255,255,.95), rgba(0,229,255,.95), rgba(124,92,255,.95));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 24px rgba(0,229,255,.15);
    }

    .sub{
      text-align:center;
      margin-top:-8px;
      margin-bottom: 12px;
      font-size: 12px;
      color: var(--muted);
    }

    .wheel-area{
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 6px 0 8px;
    }

    .wheel-shell{
      width: 320px;
      height: 320px;
      position: relative;
      display:grid;
      place-items:center;
    }

    /* Pointer */
    .pointer{
      position:absolute;
      top: -6px;
      left: 50%;
      transform: translateX(-50%);
      width: 0; height: 0;
      border-left: 16px solid transparent;
      border-right: 16px solid transparent;
      border-bottom: 28px solid var(--gold);
      filter: drop-shadow(0 10px 14px rgba(0,0,0,.45));
      z-index:5;
    }
    .pointer::after{
      content:"";
      position:absolute;
      left:50%; top: 22px;
      transform: translateX(-50%);
      width: 10px; height: 10px;
      border-radius: 999px;
      background: rgba(255,255,255,.88);
      box-shadow: 0 0 14px rgba(255,213,74,.55);
    }

    /* Wheel */
    .wheel{
      width: 100%;
      height: 100%;
      border-radius: 999px;
      border: 10px solid rgba(255,255,255,.14);
      box-shadow: 0 18px 60px rgba(0,0,0,.55), inset 0 0 0 2px rgba(255,255,255,.08);
      position:relative;
      overflow:hidden;
      cursor:pointer;
      user-select:none;
      transform: rotate(0deg);
      transition: transform 4.2s cubic-bezier(.12,.01,.12,1);
      background:
        radial-gradient(circle at 50% 50%, rgba(255,255,255,.15), transparent 52%),
        radial-gradient(circle at 50% 50%, rgba(0,229,255,.10), transparent 60%);
    }

    /* Center cap */
    .cap{
      position:absolute;
      width: 92px; height: 92px;
      border-radius: 999px;
      background: radial-gradient(circle at 30% 25%, rgba(255,255,255,.55), rgba(255,255,255,.08) 42%, rgba(0,0,0,.25));
      border: 1px solid rgba(255,255,255,.18);
      box-shadow: inset 0 0 0 2px rgba(255,255,255,.08),
                  0 12px 30px rgba(0,0,0,.5);
      display:grid;
      place-items:center;
      z-index:4;
      pointer-events:none;
    }
    .cap span{
      font-weight: 900;
      letter-spacing:.10em;
      font-size: 12px;
      color: rgba(255,255,255,.88);
    }

    /* Labels drawn over segments */
    .label{
      position:absolute;
      left:50%; top:50%;
      transform-origin: 0 0;
      font-weight: 900;
      font-size: 13px;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: rgba(10,12,24,.92);
      text-shadow: 0 1px 0 rgba(255,255,255,.22);
      width: 135px;
      text-align:center;
      pointer-events:none;
    }

    /* Controls */
    .controls{
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:center;
      margin-top: 10px;
    }

    .btn{
      border:0;
      padding: 12px 16px;
      border-radius: 14px;
      font-weight: 800;
      letter-spacing:.04em;
      cursor:pointer;
      background: linear-gradient(90deg, rgba(255,213,74,.95), rgba(255,187,64,.95));
      color:#12152E;
      box-shadow: 0 14px 26px rgba(255,213,74,.18);
      min-width: 150px;
    }
    .btn:active{ transform: translateY(1px); }
    .btn[disabled]{ opacity:.55; cursor:not-allowed; }

    .hint{
      text-align:center;
      margin-top: 10px;
      font-size: 12px;
      color: var(--muted);
    }

    .result{
      margin-top: 12px;
      text-align:center;
      padding: 12px 12px;
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.04));
      border: 1px solid rgba(255,255,255,.12);
      min-height: 46px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      font-weight: 800;
      letter-spacing:.02em;
    }
    .badge{
      font-size:12px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.16);
      background: rgba(0,0,0,.18);
      color: rgba(255,255,255,.86);
    }

    @media (max-width: 360px){
      .wheel-shell{ width: 290px; height: 290px; }
      .btn{ min-width: 130px; }
    }
  </style>
</head>

<body>
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="blob b3"></div>
  <div class="bg-grid"></div>

  <div class="wrap">
    <div class="card">
      <div class="title">FUNK CITY</div>
      <div class="sub">Tap the wheel or press SPIN</div>

      <div class="wheel-area">
        <div class="wheel-shell">
          <div class="pointer"></div>

          <!-- Canvas Wheel (crisp + professional) -->
          <canvas id="wheelCanvas" class="wheel" width="640" height="640" aria-label="Lucky Wheel"></canvas>

          <div class="cap"><span>SPIN</span></div>
        </div>
      </div>

      <div class="controls">
        <button id="spinBtn" class="btn">SPIN</button>
      </div>

      <div class="hint">6 segments • 3x WIN 100 TOMAN • 3x TRY AGAIN</div>

      <div id="result" class="result">
        <span class="badge">STATUS</span>
        <span id="resultText">Ready.</span>
      </div>
    </div>
  </div>

  <script>
    // ====== CONFIG ======
    const segments = [
      { label: "WIN 100 TOMAN", type: "win", colorA: "#FFD54A", colorB: "#FFB74A" },
      { label: "TRY AGAIN",     type: "lose", colorA: "#FF4D6D", colorB: "#FF2D55" },
      { label: "WIN 100 TOMAN", type: "win", colorA: "#00E5FF", colorB: "#2BD9FF" },
      { label: "TRY AGAIN",     type: "lose", colorA: "#B95CFF", colorB: "#7C5CFF" },
      { label: "WIN 100 TOMAN", type: "win", colorA: "#7CFFB2", colorB: "#2DFF88" },
      { label: "TRY AGAIN",     type: "lose", colorA: "#FF7A59", colorB: "#FFB74A" },
    ];

    const SPIN_DURATION_MS = 4200;  // should match CSS transition time
    const EXTRA_TURNS_MIN = 6;      // number of full turns before stopping
    const EXTRA_TURNS_MAX = 10;

    // ====== ELEMENTS ======
    const canvas = document.getElementById("wheelCanvas");
    const ctx = canvas.getContext("2d");
    const spinBtn = document.getElementById("spinBtn");
    const resultText = document.getElementById("resultText");
    const wheelClassEl = canvas; // canvas has wheel class for rotation

    // Make rotation persistent
    let currentRotation = 0; // degrees
    let spinning = false;

    // ====== DRAW WHEEL (Canvas) ======
    function drawWheel(){
      const W = canvas.width, H = canvas.height;
      const cx = W/2, cy = H/2;
      const radius = Math.min(W,H)/2 - 18;

      ctx.clearRect(0,0,W,H);

      // Outer glow ring
      ctx.save();
      ctx.translate(cx, cy);
      ctx.beginPath();
      ctx.arc(0,0,radius+6,0,Math.PI*2);
      ctx.strokeStyle = "rgba(255,255,255,.14)";
      ctx.lineWidth = 14;
      ctx.stroke();
      ctx.restore();

      const n = segments.length;
      const slice = (Math.PI * 2) / n;

      for(let i=0;i<n;i++){
        const start = -Math.PI/2 + i*slice;
        const end = start + slice;

        // Gradient fill per segment
        const grad = ctx.createLinearGradient(cx, cy, cx + Math.cos((start+end)/2)*radius, cy + Math.sin((start+end)/2)*radius);
        grad.addColorStop(0, segments[i].colorA);
        grad.addColorStop(1, segments[i].colorB);

        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, radius, start, end);
        ctx.closePath();
        ctx.fillStyle = grad;
        ctx.fill();

        // Segment separator line
        ctx.strokeStyle = "rgba(255,255,255,.20)";
        ctx.lineWidth = 3;
        ctx.stroke();

        // Label
        const mid = (start+end)/2;
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(mid);
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";

        // label background stroke for readability
        ctx.font = "900 24px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial";
        ctx.fillStyle = "rgba(10,12,24,.92)";
        // place text toward edge
        ctx.translate(radius*0.62, 0);
        ctx.rotate(Math.PI/2);
        ctx.fillText(segments[i].label, 0, 0);
        ctx.restore();
      }

      // Inner subtle ring
      ctx.save();
      ctx.translate(cx, cy);
      ctx.beginPath();
      ctx.arc(0,0,radius*0.62,0,Math.PI*2);
      ctx.strokeStyle = "rgba(255,255,255,.18)";
      ctx.lineWidth = 6;
      ctx.stroke();
      ctx.restore();
    }

    drawWheel();

    // Optional: redraw on high DPI scaling if needed (simple approach already crisp due to 640x640)
    // ====== SPIN LOGIC ======
    function randInt(min, max){
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    // Convert a target segment index into a final rotation angle that lands under the pointer at top.
    // Pointer is at -90deg (top). Our segments start at -90deg too.
    function rotationForIndex(index){
      const n = segments.length;
      const sliceDeg = 360 / n;

      // We want the chosen segment's center to align with pointer (top).
      const targetCenterDeg = (index * sliceDeg) + (sliceDeg / 2);

      // Because CSS rotation rotates the wheel clockwise, to bring targetCenter to top,
      // we rotate the wheel so that targetCenter moves to 0 from pointer reference.
      // With our drawing starting at top (-90), the mapping works with:
      // finalAngle = 360 - targetCenterDeg
      const finalAngle = (360 - targetCenterDeg) % 360;
      return finalAngle;
    }

    function setStatus(text){
      resultText.textContent = text;
    }

    function spin(){
      if(spinning) return;
      spinning = true;
      spinBtn.disabled = true;
      setStatus("Spinning...");

      const n = segments.length;
      const chosenIndex = randInt(0, n-1);              // each spin lands exactly on a segment
      const finalAngle = rotationForIndex(chosenIndex); // 0..359

      const extraTurns = randInt(EXTRA_TURNS_MIN, EXTRA_TURNS_MAX);
      const newRotation = currentRotation + extraTurns*360 + finalAngle;

      // Apply transform
      wheelClassEl.style.transform = `rotate(${newRotation}deg)`;

      // Wait for spin animation to end
      window.setTimeout(() => {
        currentRotation = newRotation % 360; // keep small number
        spinning = false;
        spinBtn.disabled = false;

        const outcome = segments[chosenIndex];
        if(outcome.type === "win"){
          setStatus("You won: 100 TOMAN");
        } else {
          setStatus("Try again!");
        }
      }, SPIN_DURATION_MS);
    }

    // Click wheel or button to spin
    spinBtn.addEventListener("click", spin);
    canvas.addEventListener("click", spin);
  </script>
</body>
